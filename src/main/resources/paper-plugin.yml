name: AstradalFeatureManagement
version: '6'
main: net.astradal.astradalFeatureManagement.AstradalFeatureManagement
api-version: '1.21'
prefix: Astradal FM
authors: [Pookachu ]
description: A plugin that manages many different aspects of Astradal
website: https://www.astradal.net
permissions:
  astradalFeatureManagement.villagerTrading.bypass:
    description: Allows someone to bypass villager trading restrictions.
    default: op
  astradalFeatureManagement.command.reload:
    description: Allows someone to reload the plugin's config.
    default: op
